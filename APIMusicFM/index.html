<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Album Finder | Last.fm API</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">Live JSON API Project</p>
      <h1>Music Album Finder</h1>
      <p class="hero-text">
        Search artists and explore their popular albums, album images, listener counts and tracklists using the Last.fm.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="controls" aria-label="Artist search controls">
      <div class="control-group">
        <label for="artistSelect">Choose artist</label>
        <select id="artistSelect">
          <option value="Coldplay">Coldplay</option>
          <option value="The Weeknd">The Weeknd</option>
          <option value="Daft Punk">Daft Punk</option>
          <option value="Adele">Adele</option>
          <option value="Metallica">Metallica</option>
          <option value="Taylor Swift">Taylor Swift</option>
        </select>
      </div>

      <form id="searchForm" class="search-form">
        <div class="control-group">
          <label for="artistInput">Custom artist search</label>
          <input id="artistInput" type="text" placeholder="Example: Queen" />
        </div>
        <button type="submit">Search</button>
      </form>
    </section>

    <section class="status-area">
      <h2 id="artistTitle">Albums</h2>
      <p id="statusText">Choose an artist or search with your own artist name.</p>
    </section>

    <section id="albumGrid" class="album-grid" aria-live="polite"></section>
  </main>

  <footer>
    <p>Data source: Last.fm API</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
